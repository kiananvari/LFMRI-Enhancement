models:
  unet:
    default:
      name: "unet"
      params:
        in_chans: 1
        out_chans: 1
        chans: 32
        depth: 4

  nafnet:
    default:
      name: "nafnet"
      params:
        in_chans: 1
        out_chans: 1
        width: 32
        middle_blk_num: 12
        enc_blk_nums: [2, 2, 4]
        dec_blk_nums: [2, 2, 2]
        dw_expand: 2
        ffn_expand: 2
        dropout_rate: 0.0

  restormer:
    default:
      name: "restormer"
      params:
        in_chans: 1
        out_chans: 1
        dim: 32
        num_blocks: [2, 3, 3, 4]
        num_refinement_blocks: 2
        heads: [1, 2, 4, 8]
        ffn_expansion_factor: 2.66
        bias: false
        layer_norm_type: "WithBias"

  unetr:
    fastmri_320:
      name: "unetr"
      params:
        in_chans: 1
        out_chans: 1
        img_size: [320, 320]
        feature_size: 32
        hidden_size: 128
        mlp_dim: 512
        num_heads: 4
        dropout_rate: 0.0
        proj_type: "conv"
        qkv_bias: false
        spatial_dims: 2

  swinir:
    medium_320:
      name: "swinir"
      params:
        in_chans: 1
        out_chans: 1
        img_size: [320, 320]
        patch_size: 1
        embed_dim: 112
        depths: [8, 8, 8, 8]
        num_heads: [7, 7, 7, 7]
        window_size: 8
        mlp_ratio: 4.0
        qkv_bias: true
        qk_scale: null
        drop_rate: 0.0
        attn_drop_rate: 0.0
        drop_path_rate: 0.1
        ape: false
        patch_norm: true
        resi_connection: "1conv"
        img_range: 1.0

    medium_256:
      name: "swinir"
      params:
        in_chans: 1
        out_chans: 1
        img_size: [256, 256]
        patch_size: 1
        embed_dim: 112
        depths: [8, 8, 8, 8]
        num_heads: [7, 7, 7, 7]
        window_size: 8
        mlp_ratio: 4.0
        qkv_bias: true
        qk_scale: null
        drop_rate: 0.0
        attn_drop_rate: 0.0
        drop_path_rate: 0.1
        ape: false
        patch_norm: true
        resi_connection: "1conv"
        img_range: 1.0

  promptmr:
    default:
      name: "promptmr"
      params:
        in_chans: 1
        out_chans: 1
        chans: 32
        depth: 4
        upsample_method: "conv"
        promptmr_feature_dim_like_unet: true

        promptmr_use_cabs: true
        promptmr_use_instancenorm: true
        promptmr_use_freq_cab: true
        promptmr_use_fremodule: true

        promptmr_use_prompt_injection: true

        promptmr_contrast_aware_stem: true
        promptmr_stem_separate_per_contrast_conv: false
        promptmr_stem_use_freq_mix: true
        promptmr_stem_mix_freq_mode: "all"
        promptmr_contrast_attn_heads: 4
        promptmr_contrast_attn_gate_init: 0.5

        promptmr_enable_buffer: false
        promptmr_enable_history: false

  nlm:
    default:
      name: "nlm"
      params:
        h: 0.05
        patch_size: 5
        patch_distance: 6
        fast_mode: true

  bm3d:
    default:
      name: "bm3d"
      params:
        sigma_psd: 0.05
        stage_arg: "all"
